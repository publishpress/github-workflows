name: Deploy Pro Plugin to PublishPress.com
permissions:
  contents: read
on:
  workflow_call:

env:
  DEV_SCRIPTS_DIR: ${{ github.workspace }}/vendor/publishpress/dev-workspace/scripts

jobs:
  deploy-pro:
    name: Deploy tagged release to PublishPress.com
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up PHP
        # shivammathur/setup-php@2.37.0
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: 8.3
          extensions: mbstring,xml,curl,zip,intl,bcmath,gettext,mysqli,phar,gd,iconv,yaml

      - name: Create root .env file
        run: |
          cp $GITHUB_WORKSPACE/.env.example $GITHUB_WORKSPACE/.env

      - name: Validate Composer configuration
        run: composer validate

      - name: Install Composer dependencies
        run: composer install

      - name: Show dev-workspace tool versions
        run: composer info:version

      - name: Add dev-workspace scripts to PATH
        run: echo "$DEV_SCRIPTS_DIR" >> "$GITHUB_PATH"

      - name: Build plugin package
        run: composer build

      - name: Read plugin metadata and version
        id: get-metadata
        run: |
          PLUGIN_SLUG=$(jq -r '.extra["plugin-slug"]' composer.json)
          PLUGIN_FOLDER=$(jq -r '.extra["plugin-folder"]' composer.json)
          PLUGIN_NAME=$(jq -r '.extra["plugin-name"]' composer.json)
          PLUGIN_VERSION=$(plugin-version.sh)
          echo "plugin_slug=${PLUGIN_SLUG}" >> "$GITHUB_OUTPUT"
          echo "plugin_folder=${PLUGIN_FOLDER}" >> "$GITHUB_OUTPUT"
          echo "plugin_name=${PLUGIN_NAME}" >> "$GITHUB_OUTPUT"
          echo "plugin_version=${PLUGIN_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload GitHub release asset
        # softprops/action-gh-release@v3.0.0
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: ${{ github.workspace }}/dist/${{ steps.get-metadata.outputs.plugin_name }}-${{ steps.get-metadata.outputs.plugin_version }}.zip
