name: Analyze code complexity
permissions:
  contents: read
on:
  workflow_call:

env:
  DEV_SCRIPTS_DIR: ${{ github.workspace }}/vendor/publishpress/dev-workspace/scripts

jobs:
  check:
    name: Run code complexity analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up PHP
        # shivammathur/setup-php@2.37.0
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: 8.3
          extensions: mbstring,xml,curl,zip,intl,bcmath,gettext,mysqli,phar,gd,iconv,yaml
          tools: composer:v2

      - name: Create root .env file
        run: cp $GITHUB_WORKSPACE/.env.example $GITHUB_WORKSPACE/.env

      - name: Validate Composer configuration
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Show dev-workspace tool versions
        run: composer info:version

      - name: Add dev-workspace scripts to PATH
        run: echo "$DEV_SCRIPTS_DIR" >> "$GITHUB_PATH"

      - name: Run code complexity analysis
        run: |
          set -o pipefail
          composer metrics -- --report-violations=metrics/violations.xml . | tee metrics-output.log

      - name: Enforce complexity gate and show actionable violations
        run: |
          critical=$(grep -E "^[[:space:]]*Critical[[:space:]]+[0-9]+" metrics-output.log | awk '{print $2}' | tail -n 1)
          errors=$(grep -E "^[[:space:]]*Error[[:space:]]+[0-9]+" metrics-output.log | awk '{print $2}' | tail -n 1)
          warnings=$(grep -E "^[[:space:]]*Warning[[:space:]]+[0-9]+" metrics-output.log | awk '{print $2}' | tail -n 1)
          information=$(grep -E "^[[:space:]]*Information[[:space:]]+[0-9]+" metrics-output.log | awk '{print $2}' | tail -n 1)

          critical=${critical:-0}
          errors=${errors:-0}
          warnings=${warnings:-0}
          information=${information:-0}

          echo "Violations"
          printf "    %-43s %s\n" "Critical" "${critical}"
          printf "    %-43s %s\n" "Error" "${errors}"
          printf "    %-43s %s\n" "Warning" "${warnings}"
          printf "    %-43s %s\n" "Information" "${information}"

          if [ -f metrics/violations.xml ]; then
            php -r '
              $file = "metrics/violations.xml";
              $doc = new DOMDocument();
              if (!$doc->load($file)) {
                fwrite(STDERR, "Failed to parse violations file\n");
                exit(0);
              }

              $files = $doc->getElementsByTagName("file");
              foreach ($files as $f) {
                foreach ($f->getElementsByTagName("violation") as $v) {
                  $priority = (int) $v->getAttribute("priority");
                  if ($priority > 2) {
                    continue;
                  }

                  $path = $f->getAttribute("name");
                  if ("" === $path) {
                    $path = $v->getAttribute("file");
                  }

                  $entity = $v->getAttribute("class");
                  if ("" === $entity) {
                    $entity = $v->getAttribute("package");
                  }

                  $line = (int) $v->getAttribute("beginline");
                  if ($line <= 0) {
                    $line = (int) $v->getAttribute("line");
                  }

                  $message = trim(preg_replace("/\s+/", " ", $v->textContent));
                  $label = $priority > 0 ? "P" . $priority : "P?";
                  $entityLabel = "";
                  if ("" !== $entity) {
                    $entityLabel = " [" . $entity . "]";
                  }

                  if ("" !== $path && $line > 0) {
                    echo "::error file=${path},line=${line}::[${label}]${entityLabel} ${message}\n";
                  } elseif ("" !== $path) {
                    echo "::error file=${path}::[${label}]${entityLabel} ${message}\n";
                  } else {
                    echo "::error::[${label}]${entityLabel} ${message}\n";
                  }
                }
              }
            '
          fi

          if [ "$critical" -gt 0 ] || [ "$errors" -gt 0 ]; then
            echo "Failing workflow due to PHPMetrics violations (Critical=${critical}, Error=${errors})."
            exit 1
          fi