name: Sync changelog to WordPress

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      repository:
        description: Repository full name to send. Defaults to the caller owner/repository.
        required: false
        type: string
      tag:
        description: Release tag to sync. Defaults to the release tag or current ref name.
        required: false
        type: string
    secrets:
      CHANGELOG_SYNC_URL:
        description: WordPress changelog sync REST endpoint URL.
        required: true
      CHANGELOG_SYNC_SECRET:
        description: Shared HMAC secret configured on the WordPress site.
        required: true
  workflow_dispatch:
    inputs:
      repository:
        description: Repository full name to send.
        required: false
        type: string
      tag:
        description: Release tag to sync.
        required: true
        type: string

jobs:
  sync-changelog:
    name: Notify WordPress changelog bridge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve payload
        id: payload
        shell: bash
        env:
          INPUT_REPOSITORY: ${{ inputs.repository }}
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_FULL_NAME: ${{ github.repository }}
        run: |
          set -euo pipefail

          raw_repository="${INPUT_REPOSITORY:-$REPOSITORY_FULL_NAME}"
          tag="${INPUT_TAG:-${RELEASE_TAG:-$REF_NAME}}"

          if [[ -z "$raw_repository" ]]; then
            echo "Repository could not be resolved." >&2
            exit 1
          fi

          if [[ "$raw_repository" == */* ]]; then
            repository="$raw_repository"
          else
            repository="$REPOSITORY_OWNER/$raw_repository"
          fi

          if [[ ! "$repository" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Repository must use the owner/repository format." >&2
            exit 1
          fi

          if [[ -z "$tag" ]]; then
            echo "Tag could not be resolved." >&2
            exit 1
          fi

          body="$(jq -cn --arg repository "$repository" --arg tag "$tag" '{repository:$repository,tag:$tag}')"
          timestamp="$(date +%s)"

          {
            echo "body=$body"
            echo "timestamp=$timestamp"
          } >> "$GITHUB_OUTPUT"

      - name: Sign payload
        id: signature
        shell: bash
        env:
          BODY: ${{ steps.payload.outputs.body }}
          TIMESTAMP: ${{ steps.payload.outputs.timestamp }}
          CHANGELOG_SYNC_SECRET: ${{ secrets.CHANGELOG_SYNC_SECRET }}
        run: |
          set -euo pipefail
          signature="$(
            python3 - <<'PY'
          import hashlib
          import hmac
          import os

          body = os.environ["BODY"]
          timestamp = os.environ["TIMESTAMP"]
          secret = os.environ["CHANGELOG_SYNC_SECRET"].encode()
          message = f"{timestamp}.{body}".encode()

          print(hmac.new(secret, message, hashlib.sha256).hexdigest())
          PY
          )"
          echo "signature=sha256=$signature" >> "$GITHUB_OUTPUT"

      - name: Call changelog bridge
        shell: bash
        env:
          CHANGELOG_SYNC_URL: ${{ secrets.CHANGELOG_SYNC_URL }}
          BODY: ${{ steps.payload.outputs.body }}
          TIMESTAMP: ${{ steps.payload.outputs.timestamp }}
          SIGNATURE: ${{ steps.signature.outputs.signature }}
        run: |
          set -euo pipefail

          if [[ "$CHANGELOG_SYNC_URL" != https://* ]]; then
            echo "CHANGELOG_SYNC_URL must use https." >&2
            exit 1
          fi

          curl --fail-with-body --show-error --silent \
            --request POST "$CHANGELOG_SYNC_URL" \
            --header "Content-Type: application/json" \
            --header "X-PublishPress-Changelog-Timestamp: $TIMESTAMP" \
            --header "X-PublishPress-Changelog-Signature: $SIGNATURE" \
            --data "$BODY"
