name: Sync changelog to WordPress

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      repository:
        description: Repository full name to send. Defaults to the caller owner/repository.
        required: false
        type: string
    secrets:
      CHANGELOG_SYNC_URL_STAGING:
        description: Staging WordPress changelog sync REST endpoint URL.
        required: false
      CHANGELOG_SYNC_SECRET_STAGING:
        description: Shared HMAC secret configured on the staging WordPress site.
        required: false
      CHANGELOG_SYNC_URL_PRODUCTION:
        description: Production WordPress changelog sync REST endpoint URL.
        required: false
      CHANGELOG_SYNC_SECRET_PRODUCTION:
        description: Shared HMAC secret configured on the production WordPress site.
        required: false
  workflow_dispatch:
    inputs:
      repository:
        description: Repository full name to send.
        required: false
        type: string

jobs:
  sync-changelog:
    name: Notify WordPress changelog bridge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve payload
        id: payload
        shell: bash
        env:
          INPUT_REPOSITORY: ${{ inputs.repository }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_FULL_NAME: ${{ github.repository }}
        run: |
          set -euo pipefail

          raw_repository="${INPUT_REPOSITORY:-$REPOSITORY_FULL_NAME}"

          if [[ -z "$raw_repository" ]]; then
            echo "Repository could not be resolved." >&2
            exit 1
          fi

          if [[ "$raw_repository" == */* ]]; then
            repository="$raw_repository"
          else
            repository="$REPOSITORY_OWNER/$raw_repository"
          fi

          if [[ ! "$repository" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Repository must use the owner/repository format." >&2
            exit 1
          fi

          body="$(jq -cn --arg repository "$repository" '{repository:$repository}')"
          timestamp="$(date +%s)"

          {
            echo "body=$body"
            echo "timestamp=$timestamp"
          } >> "$GITHUB_OUTPUT"

      - name: Call changelog bridge endpoints
        shell: bash
        env:
          BODY: ${{ steps.payload.outputs.body }}
          TIMESTAMP: ${{ steps.payload.outputs.timestamp }}
          CHANGELOG_SYNC_URL_STAGING: ${{ secrets.CHANGELOG_SYNC_URL_STAGING }}
          CHANGELOG_SYNC_SECRET_STAGING: ${{ secrets.CHANGELOG_SYNC_SECRET_STAGING }}
          CHANGELOG_SYNC_URL_PRODUCTION: ${{ secrets.CHANGELOG_SYNC_URL_PRODUCTION }}
          CHANGELOG_SYNC_SECRET_PRODUCTION: ${{ secrets.CHANGELOG_SYNC_SECRET_PRODUCTION }}
        run: |
          set -uo pipefail

          configured=0

          call_endpoint() {
            local environment="$1"
            local url="$2"
            local secret="$3"

            if [[ -z "$url" && -z "$secret" ]]; then
              echo "Skipping $environment changelog sync because no endpoint secrets are configured."
              write_environment_summary "$environment" "skipped" "n/a" "n/a" "n/a" "n/a" "No endpoint secrets are configured." "0"
              return 0
            fi

            if [[ -z "$url" || -z "$secret" ]]; then
              echo "::warning::Skipping $environment changelog sync because both URL and secret must be configured."
              write_environment_summary "$environment" "skipped" "n/a" "n/a" "n/a" "n/a" "Both URL and secret must be configured." "0"
              return 0
            fi

            configured=1

            if [[ "$url" != https://* ]]; then
              echo "::warning::Skipping $environment changelog sync because the URL must use https."
              write_environment_summary "$environment" "skipped" "n/a" "n/a" "n/a" "n/a" "The endpoint URL must use https." "0"
              return 0
            fi

            local signature
            signature="$(
              CHANGELOG_SYNC_SECRET="$secret" python3 -c 'import hashlib, hmac, os; body = os.environ["BODY"]; timestamp = os.environ["TIMESTAMP"]; secret = os.environ["CHANGELOG_SYNC_SECRET"].encode(); message = f"{timestamp}.{body}".encode(); print(hmac.new(secret, message, hashlib.sha256).hexdigest())'
            )"

            echo "Calling $environment changelog sync endpoint..."

            local response
            local curl_status
            set +e
            response="$(curl --fail-with-body --show-error --silent \
              --request POST "$url" \
              --header "Content-Type: application/json" \
              --header "X-PublishPress-Changelog-Timestamp: $TIMESTAMP" \
              --header "X-PublishPress-Changelog-Signature: sha256=$signature" \
              --data "$BODY")"
            curl_status=$?
            set -e

            if [[ "$curl_status" -ne 0 ]]; then
              if [[ -n "$response" ]]; then
                echo "$response"
              fi
              echo "::warning::$environment changelog sync failed. Release workflow will continue."
              write_environment_summary "$environment" "failed" "n/a" "n/a" "n/a" "n/a" "Request failed. Check the workflow log for the endpoint response." "0"
              return 0
            fi

            print_response_summary "$environment" "$response"
            echo "$environment changelog sync completed."
          }

          print_response_summary() {
            local environment="$1"
            local response="$2"

            if ! jq -e . >/dev/null 2>&1 <<< "$response"; then
              echo "$environment changelog sync returned a non-JSON response:"
              echo "$response"
              write_environment_summary "$environment" "failed" "n/a" "n/a" "n/a" "n/a" "Endpoint returned a non-JSON response." "0"
              return 0
            fi

            local success status repository requested source_ref source updated_targets
            success="$(jq -r '.success // false' <<< "$response")"
            status="$(jq -r '.data.status // "unknown"' <<< "$response")"
            repository="$(jq -r '.data.repository // "n/a"' <<< "$response")"
            requested="$(jq -r '.data.requestedRepository // "n/a"' <<< "$response")"
            source_ref="$(jq -r '.data.sourceRef // "n/a"' <<< "$response")"
            source="$(jq -r '.data.source // .data.message // "n/a"' <<< "$response")"
            updated_targets="$(jq -r '.data.updatedTargets // (.data.targets // [] | length)' <<< "$response")"
            local summary_status
            if [[ "$success" == "true" && "$status" == "updated" ]]; then
              summary_status="success"
            elif [[ "$success" == "true" ]]; then
              summary_status="$status"
            else
              summary_status="failed"
            fi

            {
              echo ""
              echo "$(environment_label "$environment") changelog sync result:"
              echo "| Field | Value |"
              echo "| --- | --- |"
              echo "| Status | $(status_label "$summary_status") |"
              echo "| Success | $success |"
              echo "| Status | $status |"
              echo "| Repository | $repository |"
              echo "| Requested repository | $requested |"
              echo "| Source ref | $source_ref |"
              echo "| Source | $source |"
              echo "| Updated targets | $updated_targets |"
            }

            if jq -e '.data.targets and (.data.targets | length > 0)' >/dev/null 2>&1 <<< "$response"; then
              {
                echo ""
                echo "$(environment_label "$environment") changelog sync targets:"
                echo "| Type | ID | Label | Repository | Repository Type |"
                echo "| --- | --- | --- | --- | --- |"
                jq -r '.data.targets[] | "| \(.type // "n/a") | \(.id // "n/a") | \(.label // "n/a") | \(.repository // "n/a") | \(.repositoryType // "n/a") |"' <<< "$response"
              }
            fi

            write_environment_summary "$environment" "$summary_status" "$repository" "$requested" "$source_ref" "$source" "$status" "$updated_targets"

            if jq -e '.data.targets and (.data.targets | length > 0)' >/dev/null 2>&1 <<< "$response"; then
              {
                echo "<details>"
                echo "<summary>$(environment_label "$environment") updated targets</summary>"
                echo ""
                echo "| Type | ID | Label | Repository | Repository Type |"
                echo "| --- | --- | --- | --- | --- |"
                jq -r '.data.targets[] | "| \(.type // "n/a") | \(.id // "n/a") | \(.label // "n/a") | \(.repository // "n/a") | \(.repositoryType // "n/a") |"' <<< "$response"
                echo ""
                echo "</details>"
                echo ""
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          status_label() {
            local status="$1"

            case "$status" in
              success|updated)
                echo "🟢 Success"
                ;;
              missing|skipped)
                echo "🟡 ${status^}"
                ;;
              failed|error)
                echo "🔴 Failed"
                ;;
              *)
                echo "⚪ $status"
                ;;
            esac
          }

          environment_label() {
            local environment="$1"

            case "$environment" in
              production)
                echo "Production"
                ;;
              staging)
                echo "Staging"
                ;;
              *)
                echo "${environment^}"
                ;;
            esac
          }

          escape_html() {
            local value="$1"
            value="${value//&/&amp;}"
            value="${value//</&lt;}"
            value="${value//>/&gt;}"
            value="${value//\"/&quot;}"
            echo "$value"
          }

          write_environment_summary() {
            local environment="$1"
            local status="$2"
            local repository="$3"
            local requested="$4"
            local source_ref="$5"
            local source="$6"
            local message="$7"
            local updated_targets="$8"
            local label
            local environment_title
            label="$(status_label "$status")"
            environment_title="$(environment_label "$environment")"

            {
              echo "### $environment_title Changelog Sync"
              echo ""
              echo "<table>"
              echo "  <tr><th align=\"left\">Field</th><th align=\"left\">Value</th></tr>"
              echo "  <tr><td>Status</td><td><strong>$(escape_html "$label")</strong></td></tr>"
              echo "  <tr><td>Repository</td><td><code>$(escape_html "$repository")</code></td></tr>"
              echo "  <tr><td>Requested repository</td><td><code>$(escape_html "$requested")</code></td></tr>"
              echo "  <tr><td>Source ref</td><td><code>$(escape_html "$source_ref")</code></td></tr>"
              echo "  <tr><td>Source</td><td>$(escape_html "$source")</td></tr>"
              echo "  <tr><td>Message</td><td>$(escape_html "$message")</td></tr>"
              echo "  <tr><td>Updated targets</td><td>$(escape_html "$updated_targets")</td></tr>"
              echo "</table>"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          }

          call_endpoint "production" "$CHANGELOG_SYNC_URL_PRODUCTION" "$CHANGELOG_SYNC_SECRET_PRODUCTION"
          call_endpoint "staging" "$CHANGELOG_SYNC_URL_STAGING" "$CHANGELOG_SYNC_SECRET_STAGING"

          if [[ "$configured" -eq 0 ]]; then
            echo "::warning::No changelog sync endpoints were configured."
          fi
